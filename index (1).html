function showType(code) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.t-'+code).classList.add('active');
  const d = types[code];
  document.getElementById('placeholder').style.display = 'none';
  const panel = document.getElementById('detail');
  panel.className = 'detail-panel active theme-' + d.theme;
  panel.innerHTML = `
    <div class="detail-header">
      <div class="type-code">${code}</div>
      <div>
        <h2>${d.name}</h2>
        <div class="functions">${d.functions.replace('\n','<br>')}</div>
      </div>
    </div>
    <div class="section-card">
      <h3>🌟 本来の姿</h3>
      <p>${d.honrai}</p>
    </div>
    <div class="section-card">
      <h3>✨ 特徴</h3>
      <ul class="trait-list">${d.traits.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>
    <div class="section-card">
      <h3>👁 周囲に与える印象</h3>
      <ul class="trait-list">${d.impression.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>
    <div class="section-card">
      <h3>🌱 今後の成長に向けての課題</h3>
      <ul class="trait-list">${d.growth.map(g=>`<li>${g}</li>`).join('')}</ul>
    </div>
  `;
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
